<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Logger</title>
  <link rel="stylesheet" href="https://unpkg.com/terminal.css@0.7.2/dist/terminal.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      font-family: var(--mono-font-stack);
    }

    /* ── Header ── */
    #header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 6px 10px;
      border-bottom: 1px solid var(--secondary-color);
      flex-shrink: 0;
    }
    #header h1 {
      font-size: 1rem;
      font-weight: bold;
      letter-spacing: 2px;
      color: var(--primary-color);
      white-space: nowrap;
      flex-shrink: 0;
    }
    #status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--secondary-color);
      display: inline-block;
      flex-shrink: 0;
    }
    #status-dot.live { background: var(--primary-color); box-shadow: 0 0 6px var(--primary-color); }
    #header-info {
      font-size: 0.75rem;
      color: var(--secondary-color);
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    #brand-logo {
      margin-left: auto;
      height: 24px;
      flex-shrink: 0;
    }

    /* ── Main layout ── */
    #main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Container sidebar ── */
    #sidebar {
      width: 260px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--secondary-color);
      overflow: hidden;
    }
    #sidebar-title {
      padding: 4px 8px;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--secondary-color);
      border-bottom: 1px solid var(--secondary-color);
      flex-shrink: 0;
    }
    #container-search {
      margin: 4px;
      padding: 3px 6px;
      font-size: 0.75rem;
      font-family: var(--mono-font-stack);
      background: transparent;
      border: 1px solid var(--secondary-color);
      color: var(--font-color);
      width: calc(100% - 8px);
      flex-shrink: 0;
    }
    #container-search:focus {
      outline: none;
      border-color: var(--primary-color);
    }
    .ctr-section {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--secondary-color);
      padding: 6px 6px 2px;
      border-top: 1px solid var(--secondary-color);
      opacity: 0.5;
      margin-top: 4px;
      user-select: none;
    }
    .ctr-section:first-child {
      border-top: none;
      margin-top: 0;
    }
    #container-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .ctr-btn {
      width: 100%;
      text-align: left;
      padding: 4px 6px;
      font-size: 0.8rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      background: transparent;
      border: 1px solid transparent;
      color: var(--font-color);
      font-family: var(--mono-font-stack);
    }
    .ctr-btn:hover {
      border-color: var(--primary-color);
    }
    .ctr-btn.active {
      border-color: var(--primary-color);
      color: var(--primary-color);
    }
    .ctr-status {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
      background: var(--secondary-color);
    }
    .ctr-status.running { background: var(--primary-color); }
    .ctr-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── Log area ── */
    #log-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Toolbar ── */
    #toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 12px;
      border-bottom: 1px solid var(--secondary-color);
      flex-shrink: 0;
      flex-wrap: wrap;
      background: rgba(255,255,255,0.03);
    }
    .toolbar-group {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    #toolbar input[type="text"] {
      background: transparent;
      border: 1px solid var(--secondary-color);
      color: var(--font-color);
      padding: 2px 8px;
      font-size: 0.8rem;
      font-family: var(--mono-font-stack);
      min-width: 180px;
    }
    #toolbar input[type="text"]:focus {
      outline: none;
      border-color: var(--primary-color);
      box-shadow: 0 0 4px var(--primary-color);
    }
    #toolbar select {
      background: var(--background-color);
      border: 1px solid var(--secondary-color);
      color: var(--font-color);
      padding: 1px 4px;
      font-size: 0.8rem;
      cursor: pointer;
    }
    #toolbar select:focus {
      outline: none;
      border-color: var(--primary-color);
    }
    #toolbar button {
      background: transparent;
      border: 1px solid var(--secondary-color);
      color: var(--font-color);
      padding: 2px 10px;
      font-size: 0.8rem;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.1s;
    }
    #toolbar button:hover {
      border-color: var(--primary-color);
      color: var(--primary-color);
    }
    #toolbar button:active {
      background: var(--primary-color);
      color: var(--background-color);
    }
    #toolbar-label {
      font-size: 0.7rem;
      color: var(--secondary-color);
      text-transform: uppercase;
      font-weight: bold;
    }
    #toolbar .chk-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
      cursor: pointer;
      user-select: none;
    }

    /* ── Log output ── */
    #log-area {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      font-family: var(--mono-font-stack);
      font-size: 0.85rem;
      line-height: 1.4;
      background: var(--background-color);
      color: var(--font-color);
    }
    #log-placeholder {
      color: var(--secondary-color);
      font-style: italic;
      opacity: 0.6;
    }

    .log-line { display: flex; gap: 10px; flex-wrap: wrap; word-break: break-all; }
    .log-line + .log-line { margin-top: 2px; }

    .ts   { color: var(--tertiary-color); flex-shrink: 0; opacity: 0.8; }
    .cn   { color: var(--secondary-color); flex-shrink: 0; font-weight: bold; }
    .msg  { flex: 1; }

    /* ── Footer ── */
    #footer {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 4px 12px;
      border-top: 1px solid var(--secondary-color);
      flex-shrink: 0;
      font-size: 0.7rem;
      color: var(--secondary-color);
      background: rgba(255,255,255,0.02);
    }


    /* Scrollbar */
    #log-area::-webkit-scrollbar { width: 10px; }
    #log-area::-webkit-scrollbar-track { background: var(--background-color); }
    #log-area::-webkit-scrollbar-thumb { background: #333; border: 2px solid var(--background-color); }
    #log-area::-webkit-scrollbar-thumb:hover { background: #444; }

    /* ── Highlighting panel ── */
    #hl-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(2px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }
    #hl-overlay.hidden { display: none; }
    #hl-box {
      width: 650px;
      max-width: 95vw;
      max-height: 85vh;
      overflow-y: auto;
      border: 2px solid var(--primary-color);
      padding: 30px;
      background: var(--background-color);
      display: flex;
      flex-direction: column;
      gap: 20px;
      box-shadow: 0 0 30px rgba(0,0,0,0.5);
    }
    #hl-box h2 {
      font-size: 1rem;
      letter-spacing: 3px;
      color: var(--primary-color);
      text-transform: uppercase;
      margin-bottom: 10px;
      border-bottom: 1px solid var(--primary-color);
      padding-bottom: 10px;
    }
    .hl-section-title {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--secondary-color);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .hl-section-title::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--secondary-color);
      opacity: 0.3;
    }
    .hl-default-row {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 0.8rem;
      margin-bottom: 8px;
      padding: 4px 8px;
      background: rgba(255,255,255,0.03);
    }
    .hl-swatch-preview {
      width: 12px;
      height: 12px;
      flex-shrink: 0;
    }
    .hl-rule-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      padding: 8px;
      border: 1px solid var(--secondary-color);
    }
    .hl-rule-row input[type="text"] {
      flex: 1;
      padding: 4px 10px;
      font-size: 0.85rem;
      font-family: var(--mono-font-stack);
      background: rgba(0,0,0,0.2);
      color: var(--font-color);
      border: 1px solid var(--secondary-color);
      min-width: 0;
    }
    .hl-rule-row input[type="text"]:focus { outline: none; border-color: var(--primary-color); }
    .hl-swatches {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
      flex-wrap: wrap;
      max-width: 160px;
    }
    .hl-swatch {
      width: 20px;
      height: 20px;
      cursor: pointer;
      border: 1px solid transparent;
      padding: 0;
      flex-shrink: 0;
    }
    .hl-swatch:hover { border-color: var(--font-color); transform: scale(1.1); }
    .hl-swatch.selected { border: 2px solid #fff; outline: 1px solid #000; }
    .hl-remove {
      padding: 4px 12px;
      font-size: 1rem;
      cursor: pointer;
      flex-shrink: 0;
      color: var(--error-color);
      background: transparent;
      border: 1px solid var(--error-color);
      line-height: 1;
    }
    .hl-remove:hover { background: var(--error-color); color: var(--background-color); }
    #btn-add-rule {
      background: transparent;
      border: 1px dashed var(--secondary-color);
      color: var(--secondary-color);
      padding: 8px;
      cursor: pointer;
      font-family: var(--mono-font-stack);
      text-transform: uppercase;
      font-size: 0.8rem;
    }
    #btn-add-rule:hover {
      border-style: solid;
      border-color: var(--primary-color);
      color: var(--primary-color);
    }
    #btn-hl-close {
      margin-top: 10px;
      padding: 8px;
      background: var(--primary-color);
      color: var(--background-color);
      border: none;
      cursor: pointer;
      font-family: var(--mono-font-stack);
      font-weight: bold;
      text-transform: uppercase;
    }
    #btn-hl-close:hover {
      filter: brightness(1.2);
    }

    #hl-box::-webkit-scrollbar { width: 6px; }
    #hl-box::-webkit-scrollbar-thumb { background: var(--secondary-color); }

    /* ── Themes ── */
    :root, [data-theme="dark"] {
      --background-color: #0d0f12;
      --font-color: #c9d1d9;
      --primary-color: #39d353;
      --secondary-color: #556073;
      --tertiary-color: #58a6ff;
      --error-color: #f85149;
      --link-color: #58a6ff;
    }
    [data-theme="light"] {
      --background-color: #f4f4f0;
      --font-color: #1a1a1a;
      --primary-color: #1a7f37;
      --secondary-color: #6e7781;
      --tertiary-color: #0550ae;
      --error-color: #cf222e;
      --link-color: #0550ae;
    }
    body {
      background: var(--background-color);
      color: var(--font-color);
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div id="header">
    <span id="status-dot"></span>
    <h1>LOGGER</h1>
    <span id="header-info">nenhum container selecionado</span>
    <img id="brand-logo" src="/img/solanis-logo.svg" alt="Solanis" />
  </div>

  <!-- Main -->
  <div id="main">

    <!-- Sidebar: container list -->
    <div id="sidebar">
      <div id="sidebar-title">Containers</div>
      <input id="container-search" type="text" placeholder="buscar container..." />
      <div id="container-list">
        <span style="color:var(--secondary-color);font-size:0.75rem;padding:6px;">Carregando...</span>
      </div>
    </div>

    <!-- Log panel -->
    <div id="log-panel">

      <!-- Toolbar -->
      <div id="toolbar">
        <div class="toolbar-group">
          <span id="toolbar-label">Search</span>
          <input id="search-input" type="text" placeholder="filter logs..." />
        </div>

        <div class="toolbar-group">
          <label for="date-select" id="toolbar-label">History</label>
          <select id="date-select">
            <option value="">-- select date --</option>
          </select>
          <button id="btn-search">[ Find ]</button>
        </div>

        <div class="toolbar-group" style="margin-left: auto;">
          <button id="btn-live">[ Play Live ]</button>
          <button id="btn-highlight">[ Config ]</button>
          <button id="btn-theme">[ Light ]</button>
        </div>

        <div class="toolbar-group">
          <div class="chk-wrap">
            <input id="chk-autoscroll" type="checkbox" checked />
            <label for="chk-autoscroll">Auto-scroll</label>
          </div>
        </div>
      </div>

      <!-- Log output -->
      <div id="log-area">
        <span id="log-placeholder">Selecione um container no painel esquerdo.</span>
      </div>

    </div><!-- /log-panel -->
  </div><!-- /main -->

  <!-- Footer -->
  <div id="footer">
    <span id="footer-count">0 linhas</span>
    <span>|</span>
    <span id="footer-mode">modo: —</span>
  </div>

  <!-- Highlighting panel -->
  <div id="hl-overlay" class="hidden">
    <div id="hl-box">
      <h2>Highlighting Rules</h2>

      <section>
        <div class="hl-section-title">Default Patterns (read-only)</div>
        <div id="hl-defaults"></div>
      </section>

      <section>
        <div class="hl-section-title">Custom Rules</div>
        <div id="hl-rules-list"></div>
        <button id="btn-add-rule">+ Add Rule</button>
      </section>

      <button id="btn-hl-close">Close</button>
    </div>
  </div>

  <script>
    // ── Highlighting config ──────────────────────────────────────────────────

    const PALETTE = [
      { label: 'Red',    value: '#ff5555' },
      { label: 'Orange', value: '#ffb86c' },
      { label: 'Yellow', value: '#f1fa8c' },
      { label: 'Green',  value: '#50fa7b' },
      { label: 'Cyan',   value: '#8be9fd' },
      { label: 'Blue',   value: '#6272a4' },
      { label: 'Purple', value: '#bd93f9' },
      { label: 'Pink',   value: '#ff79c6' },
      { label: 'White',  value: '#f8f8f2' },
    ];

    const DEFAULT_RULES = [
      { pattern: '\\b(ERROR|FATAL|CRITICAL|EXCEPTION)\\b', color: 'var(--error-color)',    flags: 'gi' },
      { pattern: '\\b(WARN(?:ING)?)\\b',                   color: '#ffb86c',               flags: 'gi' },
      { pattern: '\\b(INFO)\\b',                           color: 'var(--primary-color)',   flags: 'gi' },
      { pattern: '\\b(DEBUG|TRACE)\\b',                    color: 'var(--tertiary-color)',  flags: 'gi' },
    ];

    let customRules = [];
    try { customRules = JSON.parse(localStorage.getItem('logger_highlight_rules') || '[]'); } catch {}

    // ── DOM refs ─────────────────────────────────────────────────────────────

    const logArea       = document.getElementById('log-area');
    const containerList = document.getElementById('container-list');
    const searchInput   = document.getElementById('search-input');
    const dateSelect    = document.getElementById('date-select');
    const btnSearch     = document.getElementById('btn-search');
    const btnLive       = document.getElementById('btn-live');
    const chkAutoScroll = document.getElementById('chk-autoscroll');
    const statusDot     = document.getElementById('status-dot');
    const headerInfo    = document.getElementById('header-info');
    const footerCount   = document.getElementById('footer-count');
    const footerMode    = document.getElementById('footer-mode');
    const placeholder   = document.getElementById('log-placeholder');

    let currentContainer = null;
    let eventSource      = null;
    let isLive           = false;
    let lineCount        = 0;
    const MAX_LINES      = 5000;
    let rawLines         = [];
    let lastContainers   = [];

    // ── Helpers ──────────────────────────────────────────────────────────────

    function escapeHtml(text) {
      return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function highlight(text) {
      const rules = [...DEFAULT_RULES, ...customRules];
      for (const rule of rules) {
        if (!rule.pattern) continue;
        try {
          text = text.replace(
            new RegExp(rule.pattern, rule.flags || 'gi'),
            `<span style="color:${rule.color}">$&</span>`
          );
        } catch {}
      }
      return text;
    }

    function formatTime(isoString) {
      try {
        const d = new Date(isoString);
        return d.toLocaleTimeString('pt-BR', { hour12: false });
      } catch {
        return isoString;
      }
    }

    function buildLineHTML(timestamp, container, message) {
      const time = formatTime(timestamp);
      const msg  = highlight(escapeHtml(message));
      return `<div class="log-line">` +
        `<span class="ts">${escapeHtml(time)}</span>` +
        `<span class="cn">[${escapeHtml(container)}]</span>` +
        `<span class="msg">${msg}</span>` +
        `</div>`;
    }

    function buildLineFromRaw(rawLine) {
      // Format: "2026-04-18T14:32:01Z [container] message..."
      const match = rawLine.match(/^(\S+)\s+\[([^\]]+)\]\s+([\s\S]*)$/);
      if (match) {
        return buildLineHTML(match[1], match[2], match[3]);
      }
      return `<div class="log-line"><span class="msg">${highlight(escapeHtml(rawLine))}</span></div>`;
    }

    function appendEntry(ts, container, msg) {
      if (placeholder) placeholder.remove();

      rawLines.push({ ts, container, msg });

      if (rawLines.length > MAX_LINES) {
        const excess = rawLines.length - MAX_LINES;
        rawLines.splice(0, excess);
        const domLines = logArea.querySelectorAll('.log-line');
        for (let i = 0; i < excess && i < domLines.length; i++) domLines[i].remove();
      }

      logArea.insertAdjacentHTML('beforeend', buildLineHTML(ts, container, msg));
      lineCount++;
      footerCount.textContent = `${rawLines.length} linhas`;

      if (chkAutoScroll.checked) {
        logArea.scrollTop = logArea.scrollHeight;
      }
    }

    function rerenderAll() {
      if (!rawLines.length) return;
      logArea.innerHTML = '';
      const frag = document.createDocumentFragment();
      const tmp  = document.createElement('div');
      for (const e of rawLines) {
        tmp.innerHTML = buildLineHTML(e.ts, e.container, e.msg);
        frag.appendChild(tmp.firstChild);
      }
      logArea.appendChild(frag);
      footerCount.textContent = `${rawLines.length} linhas`;
      if (chkAutoScroll.checked) logArea.scrollTop = logArea.scrollHeight;
    }

    function clearLog() {
      logArea.innerHTML = '';
      rawLines  = [];
      lineCount = 0;
      footerCount.textContent = '0 linhas';
    }

    // ── SSE / Live mode ──────────────────────────────────────────────────────

    function startLive(name) {
      stopLive();
      isLive = true;
      btnLive.textContent = '⏹ Stop';
      statusDot.className = 'live';
      footerMode.textContent = 'modo: live';

      eventSource = new EventSource(`/api/logs/stream?name=${encodeURIComponent(name)}`);
      eventSource.onmessage = (e) => {
        try {
          const data = JSON.parse(e.data);
          appendEntry(data.timestamp, data.container, data.message);
        } catch {}
      };
      eventSource.onerror = () => {
        statusDot.className = '';
        footerMode.textContent = 'modo: live (reconectando...)';
      };
    }

    function stopLive() {
      if (eventSource) {
        eventSource.close();
        eventSource = null;
      }
      isLive = false;
      btnLive.textContent = '▶ Live';
      statusDot.className = '';
      footerMode.textContent = 'modo: parado';
    }

    // ── History search ───────────────────────────────────────────────────────

    async function searchHistory() {
      if (!currentContainer) return;
      const date  = dateSelect.value;
      const query = searchInput.value.trim();
      if (!date) {
        alert('Selecione uma data para buscar.');
        return;
      }

      stopLive();
      clearLog();
      footerMode.textContent = 'modo: histórico';

      const params = new URLSearchParams({ name: currentContainer, date });
      if (query) params.set('q', query);

      try {
        const res = await fetch(`/api/logs/history?${params}`);
        const lines = await res.json();
        if (!lines.length) {
          logArea.innerHTML = '<span style="color:var(--secondary-color);font-style:italic">Nenhum log encontrado.</span>';
          return;
        }
        const frag = document.createDocumentFragment();
        const tmp  = document.createElement('div');
        for (const line of lines) {
          const m = line.match(/^(\S+)\s+\[([^\]]+)\]\s+([\s\S]*)$/);
          if (m) {
            rawLines.push({ ts: m[1], container: m[2], msg: m[3] });
            tmp.innerHTML = buildLineHTML(m[1], m[2], m[3]);
          } else {
            rawLines.push({ ts: '', container: '', msg: line });
            tmp.innerHTML = buildLineFromRaw(line);
          }
          frag.appendChild(tmp.firstChild);
        }
        logArea.appendChild(frag);
        footerCount.textContent = `${lines.length} linhas`;
        if (chkAutoScroll.checked) logArea.scrollTop = logArea.scrollHeight;
      } catch (err) {
        logArea.innerHTML = `<span style="color:var(--error-color)">Erro: ${err.message}</span>`;
      }
    }

    // ── Container selection ──────────────────────────────────────────────────

    async function selectContainer(name) {
      // Update active button
      document.querySelectorAll('.ctr-btn').forEach(b => b.classList.remove('active'));
      document.querySelector(`.ctr-btn[data-name="${CSS.escape(name)}"]`)?.classList.add('active');

      currentContainer = name;
      headerInfo.textContent = name;
      clearLog();
      stopLive();

      // Load available dates
      try {
        const res   = await fetch(`/api/logs/dates?name=${encodeURIComponent(name)}`);
        const dates = await res.json();
        dateSelect.innerHTML = '<option value="">-- selecione --</option>';
        for (const d of dates.reverse()) {
          const opt = document.createElement('option');
          opt.value = d;
          opt.textContent = d;
          dateSelect.appendChild(opt);
        }
        // Pre-select today
        const today = new Date().toISOString().slice(0, 10);
        if (dates.includes(today)) dateSelect.value = today;
      } catch {}

      // Search today's logs by default; user can still start live manually
      if (dateSelect.value) searchHistory();
    }

    // ── Render container list ────────────────────────────────────────────────

    function makeContainerBtn(c) {
      const isPM2 = c.source === 'pm2' || c.name.startsWith('pm2:');
      const displayName = isPM2 ? c.name.replace(/^pm2:/, '') : c.name;
      const btn = document.createElement('button');
      btn.className = 'ctr-btn' + (c.name === currentContainer ? ' active' : '');
      btn.dataset.name = c.name;
      btn.innerHTML =
        `<span class="ctr-status ${c.status === 'running' ? 'running' : ''}"></span>` +
        `<span class="ctr-name" title="${escapeHtml(c.name)}">${escapeHtml(displayName)}</span>`;
      btn.addEventListener('click', () => selectContainer(c.name));
      return btn;
    }

    function renderContainers(containers) {
      lastContainers = containers;
      const q = document.getElementById('container-search').value.toLowerCase();
      const filtered = q ? containers.filter(c => c.name.toLowerCase().includes(q)) : containers;

      const dockerList = filtered.filter(c => c.source !== 'pm2' && !c.name.startsWith('pm2:'));
      const pm2List    = filtered.filter(c => c.source === 'pm2' || c.name.startsWith('pm2:'));

      containerList.innerHTML = '';

      if (!dockerList.length && !pm2List.length) {
        containerList.innerHTML = '<span style="color:var(--secondary-color);font-size:0.75rem;padding:6px">Nenhum container.</span>';
        return;
      }

      if (dockerList.length) {
        const hdr = document.createElement('div');
        hdr.className = 'ctr-section';
        hdr.textContent = 'Docker';
        containerList.appendChild(hdr);
        dockerList.forEach(c => containerList.appendChild(makeContainerBtn(c)));
      }

      if (pm2List.length) {
        const hdr = document.createElement('div');
        hdr.className = 'ctr-section';
        hdr.textContent = 'PM2';
        containerList.appendChild(hdr);
        pm2List.forEach(c => containerList.appendChild(makeContainerBtn(c)));
      }
    }

    // ── Fetch containers ─────────────────────────────────────────────────────

    async function loadContainers() {
      try {
        const res  = await fetch('/api/containers');
        const data = await res.json();
        renderContainers(data);
      } catch (err) {
        containerList.innerHTML = `<span style="color:var(--error-color);font-size:0.75rem;padding:6px">Erro: ${err.message}</span>`;
      }
    }

    // ── Events ───────────────────────────────────────────────────────────────

    btnLive.addEventListener('click', () => {
      if (!currentContainer) return;
      if (isLive) {
        stopLive();
      } else {
        clearLog();
        startLive(currentContainer);
      }
    });

    btnSearch.addEventListener('click', searchHistory);
    searchInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') searchHistory();
    });

    document.getElementById('container-search').addEventListener('input', () => {
      renderContainers(lastContainers);
    });

    // Disable auto-scroll when user scrolls up
    logArea.addEventListener('scroll', () => {
      const nearBottom = logArea.scrollHeight - logArea.scrollTop - logArea.clientHeight < 60;
      chkAutoScroll.checked = nearBottom;
    });

    // ── Highlighting panel ───────────────────────────────────────────────────

    const hlOverlay   = document.getElementById('hl-overlay');
    const hlRulesList = document.getElementById('hl-rules-list');
    const hlDefaults  = document.getElementById('hl-defaults');
    const btnHighlight = document.getElementById('btn-highlight');
    const btnAddRule   = document.getElementById('btn-add-rule');
    const btnHlClose   = document.getElementById('btn-hl-close');

    function saveAndApplyRules() {
      localStorage.setItem('logger_highlight_rules', JSON.stringify(customRules));
      rerenderAll();
    }

    function renderDefaultRules() {
      hlDefaults.innerHTML = '';
      const cssVarMap = {
        'var(--error-color)':    '#ff5555',
        'var(--primary-color)':  '#00ff00',
        'var(--tertiary-color)': '#888888',
      };
      for (const rule of DEFAULT_RULES) {
        const row    = document.createElement('div');
        row.className = 'hl-default-row';
        const swatch = document.createElement('span');
        swatch.className = 'hl-swatch-preview';
        swatch.style.background = cssVarMap[rule.color] || rule.color;
        const label  = document.createElement('span');
        label.textContent = rule.pattern;
        label.style.color = cssVarMap[rule.color] || rule.color;
        row.appendChild(swatch);
        row.appendChild(label);
        hlDefaults.appendChild(row);
      }
    }

    function renderCustomRules() {
      hlRulesList.innerHTML = '';
      customRules.forEach((rule, i) => {
        const row = document.createElement('div');
        row.className = 'hl-rule-row';

        const input = document.createElement('input');
        input.type = 'text';
        input.value = rule.pattern;
        input.placeholder = 'regex pattern...';
        input.addEventListener('input', () => {
          customRules[i].pattern = input.value;
          saveAndApplyRules();
        });

        const swatches = document.createElement('div');
        swatches.className = 'hl-swatches';
        for (const color of PALETTE) {
          const sw = document.createElement('button');
          sw.className = 'hl-swatch' + (rule.color === color.value ? ' selected' : '');
          sw.style.background = color.value;
          sw.title = color.label;
          sw.addEventListener('click', () => {
            customRules[i].color = color.value;
            saveAndApplyRules();
            renderCustomRules();
          });
          swatches.appendChild(sw);
        }

        const removeBtn = document.createElement('button');
        removeBtn.textContent = '×';
        removeBtn.className = 'hl-remove';
        removeBtn.addEventListener('click', () => {
          customRules.splice(i, 1);
          saveAndApplyRules();
          renderCustomRules();
        });

        row.appendChild(input);
        row.appendChild(swatches);
        row.appendChild(removeBtn);
        hlRulesList.appendChild(row);
      });
    }

    btnHighlight.addEventListener('click', () => {
      renderDefaultRules();
      renderCustomRules();
      hlOverlay.classList.remove('hidden');
    });

    btnHlClose.addEventListener('click', () => hlOverlay.classList.add('hidden'));

    btnAddRule.addEventListener('click', () => {
      customRules.push({ pattern: '', color: PALETTE[0].value });
      renderCustomRules();
    });

    // ── Theme toggle ────────────────────────────────────────────────────────
    const btnTheme = document.getElementById('btn-theme');
    const brandLogo = document.getElementById('brand-logo');
    const applyTheme = (theme) => {
      document.documentElement.setAttribute('data-theme', theme);
      btnTheme.textContent = theme === 'dark' ? '[ Light ]' : '[ Dark ]';
      brandLogo.src = theme === 'dark'
        ? '/img/solanis-logo.svg'
        : '/img/solanis-for-light-logo.svg';
      localStorage.setItem('logger-theme', theme);
    };
    btnTheme.addEventListener('click', () => {
      const current = document.documentElement.getAttribute('data-theme') || 'dark';
      applyTheme(current === 'dark' ? 'light' : 'dark');
    });
    applyTheme(localStorage.getItem('logger-theme') || 'dark');

    loadContainers();
    setInterval(loadContainers, 10_000);
  </script>
</body>
</html>
