services:
  logger:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./logs:/app/logs
      - ./keys:/app/keys:ro
    environment:
      - LOGS_DIR=/app/logs
      - PORT=8080
      - PGP_PUBLIC_KEY_FILE=/app/keys/pubkey.asc
    restart: unless-stopped
