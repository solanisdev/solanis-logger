services:
  logger:
    build: .
    ports:
      - "1123:1123"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./logs:/app/logs
      - ./keys:/app/keys:ro
      - /root/.pm2/logs:/pm2-logs:ro
    environment:
      - LOGS_DIR=/app/logs
      - PORT=1123
      - PM2_LOGS_DIR=/pm2-logs
    user: root
    restart: unless-stopped
